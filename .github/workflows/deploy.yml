name: Zero Downtime CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Lowercase Repository Name
        run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/louver-control-system:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase Repository Name
        run: echo "IMAGE_NAME=ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/louver-control-system:latest" >> $GITHUB_ENV

      - name: Execute Blue-Green Deployment on DigitalOcean Droplet
        uses: appleboy/ssh-action@master
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_ACTOR, CR_PAT, IMAGE_NAME
          script: |
            echo "Authenticating with GitHub Container Registry..."
            echo "$CR_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            echo "Pulling latest image: $IMAGE_NAME"
            docker pull "$IMAGE_NAME"
            
            # Create network so Nginx can resolve container names
            docker network create tea-net || true
            mkdir -p /root/nginx-conf

            # Determine Active Container (Blue or Green)
            if [ "$(docker ps -q -f name=tea-app-blue)" ]; then
              NEW_APP="tea-app-green"
              OLD_APP="tea-app-blue"
            else
              NEW_APP="tea-app-blue"
              OLD_APP="tea-app-green"
            fi

            echo "Starting New App Container: $NEW_APP"
            docker run -d --name $NEW_APP --network tea-net --restart always "$IMAGE_NAME"

            echo "Waiting 15 seconds for app to initialize..."
            sleep 15

            # Re-write Nginx Proxy config to point to the newly started container
            cat <<EOF > /root/nginx-conf/default.conf
            server {
                listen 80;
                server_name _;
                location / {
                    proxy_pass http://$NEW_APP:3000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                }
            }
            EOF

            # Check if Nginx Proxy is already running
            if [ ! "$(docker ps -q -f name=tea-nginx)" ]; then
              echo "Starting initial Nginx Proxy..."
              docker run -d --name tea-nginx --network tea-net -p 80:80 -v /root/nginx-conf:/etc/nginx/conf.d --restart always nginx:alpine
            else
              echo "Reloading Nginx Proxy to switch traffic..."
              docker exec tea-nginx nginx -s reload
            fi

            # Clean up the Old App Container
            if [ "$(docker ps -a -q -f name=$OLD_APP)" ]; then
              echo "Terminating Old App Container: $OLD_APP..."
              docker stop $OLD_APP || true
              docker rm $OLD_APP || true
            fi
            
            # Clean up unused Docker images to save disk space
            echo "Cleaning up dangling images..."
            docker image prune -a -f
